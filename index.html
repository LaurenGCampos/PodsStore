<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pod Store | Pods Descartáveis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-top">
    <div class="logo">CLUBE DO <span>VAPOR</span></div>

    <div class="busca">
      <input type="text" placeholder="Digite o que deseja encontrar...">
      <button>🔍</button>
    </div>

    <div class="acoes">
      <a href="login.html">Entrar</a>
      <button onclick="abrirCarrinho()">🛒 <span id="contador">0</span></button>
    </div>
  </div>

  <nav class="menu">
    <a href="sobre.html">Pods Descartáveis</a>
    <a href="acessorios.html">Acessórios</a>
    <a href="sobre.html">Sobre nós</a>
  </nav>
</header>

<!-- CONTEÚDO -->
<div class="container">

  <!-- FILTROS -->
  <aside class="filtros">
    <h3>Filtrar por</h3>

    <div class="filtro">
      <strong>Disponibilidade</strong>
      <label><input type="checkbox"> Disponível</label>
    </div>

    <div class="filtro">
      <strong>Tipo de Produto</strong>
      <label><input type="checkbox"> Pod Descartável</label>
      <label><input type="checkbox"> Recarregável</label>
    </div>

    <div class="filtro">
      <strong>Puffs</strong>
      <label><input type="checkbox"> 1500+</label>
      <label><input type="checkbox"> 3000+</label>
      <label><input type="checkbox"> 5000+</label>
    </div>
  </aside>

  <!-- PRODUTOS -->
  <main class="produtos" id="listaProdutos">
    <!-- gerado via JS -->
  </main>

</div>

<!-- CARRINHO -->
<div id="modalCarrinho" class="modal">
  <div class="modal-content">
    <h2>🛒 Carrinho</h2>

    <div id="itensCarrinho"></div>

    <p>Total: R$ <span id="total">0.00</span></p>

   <button onclick="finalizarCompra()" class="btn-finalizar">
  Finalizar compra
</button>

    <button onclick="fecharCarrinho()">Fechar</button>
  </div>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
